<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14120f">
<title>Guitar Tool</title>
<style>
  :root {
    --bg: #14120f;
    --card: #1e1b17;
    --card2: #262119;
    --ink: #f2ede4;
    --muted: #a39b8d;
    --line: #302b23;
    --accent: #e0954e;
    --danger: #e07b7b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    min-height: 100vh;
  }
  #app {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 16px calc(96px + env(safe-area-inset-bottom));
    min-height: 100vh;
  }

  /* Top bar */
  .top {
    position: sticky; top: 0; z-index: 5;
    display: flex; align-items: center; gap: 10px;
    padding: calc(14px + env(safe-area-inset-top)) 0 12px;
    background: linear-gradient(var(--bg) 78%, rgba(20,18,15,0));
  }
  .top h1 {
    margin: 0; font-size: 1.3rem; font-weight: 800; letter-spacing: -.01em;
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .top .lead { font-size: 1.6rem; }

  /* Buttons */
  button { font-family: inherit; cursor: pointer; }
  .icon {
    flex: 0 0 auto;
    width: 44px; height: 44px; border-radius: 12px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.4rem; line-height: 1;
    background: var(--card); color: var(--ink); border: 1px solid var(--line);
  }
  .icon:active { background: var(--card2); }
  .btn {
    flex: 0 0 auto;
    min-height: 44px; padding: 0 16px; border-radius: 12px;
    font-size: 1rem; font-weight: 700;
    background: var(--card); color: var(--ink); border: 1px solid var(--line);
  }
  .btn:active { background: var(--card2); }
  .btn.primary { background: var(--accent); color: #241500; border-color: var(--accent); }
  .btn.danger  { background: transparent; color: var(--danger); border-color: var(--line); }

  /* Song list */
  .list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .song {
    display: flex; align-items: center; gap: 12px;
    width: 100%; text-align: left;
    min-height: 60px; padding: 14px 16px; border-radius: 16px;
    background: var(--card); color: var(--ink); border: 1px solid var(--line);
    font-size: 1.1rem; font-weight: 700;
  }
  .song:active { background: var(--card2); }
  .song .pick { font-size: 1.3rem; opacity: .85; }
  .song .arrow { margin-left: auto; color: var(--muted); font-size: 1.2rem; }
  .empty { color: var(--muted); text-align: center; padding: 48px 20px; white-space: pre-line; }

  /* Tools (export / import / sync) */
  .tools { display: flex; flex-wrap: wrap; gap: 8px; margin: 24px 0 2px; }
  .tool {
    flex: 1 1 30%; min-height: 46px; padding: 0 10px; border-radius: 12px;
    font-size: .92rem; font-weight: 700;
    background: var(--card); color: var(--muted); border: 1px solid var(--line);
  }
  .tool:active { background: var(--card2); }

  /* Floating action */
  .fab {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(20px + env(safe-area-inset-bottom));
    z-index: 10;
    min-height: 52px; padding: 0 24px; border-radius: 26px;
    font-size: 1.05rem; font-weight: 800;
    background: var(--accent); color: #241500; border: none;
    box-shadow: 0 8px 24px rgba(0,0,0,.45);
  }
  .fab:active { filter: brightness(.94); }

  /* Lyrics (read view) */
  .lyrics { margin-top: 6px; font-size: 1.15rem; }
  .block {
    border-left: 3px solid var(--pc, var(--line));
    padding: 2px 0 2px 14px;
    margin: 0 0 14px;
  }
  .chip {
    display: inline-block; margin: 2px 0 8px;
    padding: 3px 12px; border-radius: 999px;
    font-size: .78rem; font-weight: 800; letter-spacing: .02em;
    text-transform: uppercase;
    color: var(--pc, var(--muted));
    background: color-mix(in srgb, var(--pc, var(--muted)) 16%, transparent);
    border: 1px solid color-mix(in srgb, var(--pc, var(--muted)) 40%, transparent);
  }
  .line { color: var(--pc, var(--ink)); font-weight: 600; }
  .block.neutral .line { color: var(--ink); }
  .spacer { height: 16px; }

  /* Editor */
  .field-label { display: block; margin: 6px 2px 6px; color: var(--muted); font-size: .85rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .title-input, .source {
    width: 100%; display: block;
    background: var(--card); color: var(--ink);
    border: 1px solid var(--line); border-radius: 14px;
    font-size: 1rem; padding: 14px;
  }
  .title-input { font-weight: 800; font-size: 1.15rem; }
  .source {
    margin-top: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    line-height: 1.6; min-height: 46vh; resize: vertical;
    white-space: pre; overflow-wrap: normal; overflow-x: auto;
  }
  .hint {
    color: var(--muted); font-size: .88rem; margin: 14px 2px 0;
  }
  .hint code {
    background: var(--card2); padding: 2px 6px; border-radius: 6px;
    font-family: ui-monospace, Menlo, monospace; color: var(--ink);
  }
  .edit-actions { display: flex; gap: 10px; margin-top: 18px; }
  .edit-actions .btn { flex: 1; }

  /* Play / presentación (full screen) */
  .play {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg); color: var(--ink);
    display: flex; flex-direction: column;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  .play-bar {
    display: flex; align-items: center; gap: 8px;
    padding: calc(8px + env(safe-area-inset-top)) 10px 8px;
  }
  .play-bar .grow { flex: 1; }
  .play-counter { color: var(--muted); font-size: .95rem; font-weight: 800; letter-spacing: .02em; }
  .play-stage {
    flex: 1; position: relative; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; overflow: hidden;
    padding: 4px 20px calc(40px + env(safe-area-inset-bottom));
  }
  .play-chip {
    margin: 0 0 22px; padding: 5px 16px; border-radius: 999px;
    font-size: .9rem; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
    color: var(--pc, var(--muted));
    background: color-mix(in srgb, var(--pc, var(--muted)) 16%, transparent);
    border: 1px solid color-mix(in srgb, var(--pc, var(--muted)) 42%, transparent);
  }
  .play-lines { color: var(--pc, var(--ink)); }
  .play-line { font-weight: 700; line-height: 1.28; }
  .play-hint {
    position: absolute; left: 0; right: 0;
    bottom: calc(12px + env(safe-area-inset-bottom));
    text-align: center; color: var(--muted); font-size: .8rem;
    pointer-events: none; opacity: .55;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";

/* ---------- storage ---------- */
const KEY = "guitar-tool:songs";
const PUBLISHED = "db.json"; // biblioteca compartida publicada en el repo

const SEED = [
  {
    id: "genio-atrapado",
    title: "Genio Atrapado",
    source: [
      "Intro | (tocá Editar y pegá acá la letra real)",
      "Frase 1 | una línea por renglón",
      "Frase 1 | lo de antes del  |  es la sección",
      "Estribillo | mismo nombre de sección = mismo color",
      "Estribillo | y se repite cada vez que aparece",
    ].join("\n"),
  },
];

function loadLocal() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) { const a = JSON.parse(raw); if (Array.isArray(a)) return a; }
  } catch (e) { /* ignore */ }
  return null;
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(songs)); } catch (e) { /* ignore */ }
}
async function fetchPublished() {
  try {
    const res = await fetch(PUBLISHED + "?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) return null;
    const a = await res.json();
    return Array.isArray(a) ? a : null;
  } catch (e) { return null; }
}

const localSongs = loadLocal();
const hadLocal = localSongs != null;
let songs = hadLocal ? localSongs : SEED.map(s => ({ ...s }));

/* ---------- section colors ---------- */
const PALETTE = [
  "#e0954e", "#e0c86a", "#9ad06a", "#6ad4c8", "#7bb0e0", "#b28ee0",
  "#e08bc0", "#e07b7b", "#8fd0a0", "#d0b48f", "#8fb0d0", "#c9e06a",
];
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function colorFor(label) {
  const key = label.trim().toLowerCase();
  return PALETTE[hashStr(key) % PALETTE.length];
}

/* ---------- parsing ---------- */
// Each line: "Label | text" -> {label, text}. No pipe -> continues previous
// label. Blank line -> {blank:true} and resets the running label.
function parse(source) {
  const out = [];
  let prev = null;
  for (const raw of (source || "").split("\n")) {
    if (raw.trim() === "") { out.push({ blank: true }); prev = null; continue; }
    const i = raw.indexOf("|");
    let label, text;
    if (i >= 0) { label = raw.slice(0, i).trim(); text = raw.slice(i + 1).trim(); }
    else { label = prev; text = raw.trim(); }
    out.push({ label: label || null, text });
    prev = label || null;
  }
  return out;
}

// Group consecutive lines with the same label into section blocks (one per
// full-screen slide). Blank lines break groups; neutral (no-label) blocks kept.
function blocksOf(source) {
  const blocks = [];
  let cur = null;
  for (const it of parse(source)) {
    if (it.blank) { cur = null; continue; }
    if (!cur || it.label !== cur.label) {
      cur = { label: it.label, color: it.label ? colorFor(it.label) : null, lines: [] };
      blocks.push(cur);
    }
    cur.lines.push(it.text);
  }
  return blocks;
}

/* ---------- dom helpers ---------- */
function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}
const app = document.getElementById("app");
function clear() { app.textContent = ""; }

/* ---------- routing / state ---------- */
let view = { name: "list", id: null, idx: 0 };
function go(name, id, idx) { view = { name, id: id ?? null, idx: idx ?? 0 }; render(); window.scrollTo(0, 0); }
function songById(id) { return songs.find(s => s.id === id); }
function newId() {
  return "s-" + hashStr(String(songs.length) + "|" + (songs.map(s => s.id).join(",")))
    + "-" + songs.length;
}

/* ---------- import / export / sync ---------- */
function download(name, text, type) {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function safeName(s) {
  return (s || "cancion").replace(/[\/\\:*?"<>|]+/g, "").trim() || "cancion";
}
function exportLibrary() {
  download("db.json", JSON.stringify(songs, null, 2), "application/json");
}
function exportSongTxt(s) {
  download(safeName(s.title) + ".txt", s.source || "", "text/plain;charset=utf-8");
}
function importFile() {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = ".json,.txt,application/json,text/plain";
  inp.addEventListener("change", () => {
    const f = inp.files && inp.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      const text = String(reader.result || "");
      const asJson = /\.json$/i.test(f.name) || text.trim().startsWith("[");
      if (asJson) {
        let data;
        try { data = JSON.parse(text); } catch (e) { alert("JSON inválido."); return; }
        if (!Array.isArray(data)) { alert("El JSON tiene que ser una lista de canciones."); return; }
        if (!confirm("Reemplazar tu biblioteca por " + data.length + " canción(es) del archivo?")) return;
        songs = data.map(x => ({
          id: x.id || newId(),
          title: String(x.title || "Sin título"),
          source: String(x.source || ""),
        }));
        save(); go("list");
      } else {
        const title = f.name.replace(/\.txt$/i, "").trim() || "Importada";
        const id = newId();
        songs.push({ id, title, source: text });
        save(); go("read", id);
      }
    };
    reader.readAsText(f);
  });
  inp.click();
}
async function reloadPublished() {
  if (!confirm("Traer la biblioteca publicada y reemplazar lo guardado en este dispositivo?")) return;
  const pub = await fetchPublished();
  if (!pub) { alert("No pude leer la biblioteca publicada (db.json)."); return; }
  songs = pub; save(); go("list");
}

/* ---------- views ---------- */
function viewList() {
  const top = el("div", "top");
  top.append(el("span", "lead", "🎸"), el("h1", null, "Canciones"));
  app.append(top);

  if (songs.length === 0) {
    app.append(el("div", "empty", "Todavía no hay canciones.\nTocá “+ Nueva” para empezar."));
  } else {
    const list = el("div", "list");
    for (const s of songs) {
      const b = el("button", "song");
      b.append(el("span", "pick", "♪"), el("span", null, s.title || "Sin título"),
        el("span", "arrow", "›"));
      b.addEventListener("click", () => go("read", s.id));
      list.append(b);
    }
    app.append(list);
  }

  const tools = el("div", "tools");
  const bExp = el("button", "tool", "⬇ Exportar db.json");
  bExp.addEventListener("click", exportLibrary);
  const bImp = el("button", "tool", "⬆ Importar");
  bImp.addEventListener("click", importFile);
  const bPub = el("button", "tool", "↻ Publicado");
  bPub.addEventListener("click", reloadPublished);
  tools.append(bExp, bImp, bPub);
  app.append(tools);
  app.append(el("p", "hint",
    "“Exportar db.json” genera el archivo de la biblioteca compartida para publicar en el repo. “Importar” acepta db.json o una canción en .txt."));

  const fab = el("button", "fab", "+ Nueva");
  fab.addEventListener("click", () => {
    const id = newId();
    songs.push({ id, title: "Nueva canción", source: "" });
    save();
    go("edit", id);
  });
  app.append(fab);
}

function viewRead() {
  const s = songById(view.id);
  if (!s) return go("list");

  const top = el("div", "top");
  const back = el("button", "icon", "‹"); back.setAttribute("aria-label", "Volver");
  back.addEventListener("click", () => go("list"));
  const edit = el("button", "btn", "Editar");
  edit.addEventListener("click", () => go("edit", s.id));
  top.append(back, el("h1", null, s.title || "Sin título"), edit);
  app.append(top);

  const lyrics = el("div", "lyrics");
  const items = parse(s.source);
  let block = null, curLabel = undefined;
  for (const it of items) {
    if (it.blank) { lyrics.append(el("div", "spacer")); block = null; curLabel = undefined; continue; }
    if (it.label !== curLabel || !block) {
      curLabel = it.label;
      block = el("div", it.label ? "block" : "block neutral");
      if (it.label) {
        const c = colorFor(it.label);
        block.style.setProperty("--pc", c);
        block.append(el("div", "chip", it.label));
      }
      lyrics.append(block);
    }
    block.append(el("div", "line", it.text));
  }
  if (items.length === 0 || items.every(i => i.blank)) {
    lyrics.append(el("div", "empty", "Canción vacía. Tocá “Editar” para cargar la letra."));
  }
  app.append(lyrics);

  if (blocksOf(s.source).length > 0) {
    const play = el("button", "fab", "▶ Presentar");
    play.addEventListener("click", () => go("play", s.id, 0));
    app.append(play);
  }
}

function viewEdit() {
  const s = songById(view.id);
  if (!s) return go("list");

  const top = el("div", "top");
  const back = el("button", "icon", "‹"); back.setAttribute("aria-label", "Volver");
  const save2 = el("button", "btn primary", "Guardar");
  top.append(back, el("h1", null, "Editar"), save2);
  app.append(top);

  app.append(el("label", "field-label", "Nombre"));
  const title = el("input", "title-input");
  title.type = "text"; title.value = s.title || ""; title.placeholder = "Nombre de la canción";
  app.append(title);

  app.append(el("label", "field-label", "Letra"));
  const src = el("textarea", "source");
  src.value = s.source || "";
  src.setAttribute("spellcheck", "false");
  src.setAttribute("autocapitalize", "off");
  src.placeholder = "Estribillo | no me quiero ir\nEstribillo | quiero quedarme";
  app.append(src);

  const hint = el("p", "hint");
  hint.append(
    document.createTextNode("Formato: "), (() => { const c = el("code", null, "Sección | letra"); return c; })(),
    document.createTextNode(" — una línea por renglón. Mismo nombre de sección = mismo color.")
  );
  app.append(hint);

  const commit = () => { s.title = title.value.trim() || "Sin título"; s.source = src.value; save(); };

  const actions = el("div", "edit-actions");
  const del = el("button", "btn danger", "Borrar");
  del.addEventListener("click", () => {
    if (!confirm("¿Borrar “" + (s.title || "esta canción") + "”?")) return;
    songs = songs.filter(x => x.id !== s.id); save(); go("list");
  });
  const txt = el("button", "btn", "Exportar .txt");
  txt.addEventListener("click", () => { commit(); exportSongTxt(s); });
  actions.append(del, txt);
  app.append(actions);

  back.addEventListener("click", () => { commit(); go("read", s.id); });
  save2.addEventListener("click", () => { commit(); go("read", s.id); });
}

/* ---------- fullscreen / wake lock (best effort) ---------- */
let wakeLock = null;
async function acquireWake() {
  try { if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); }
  catch (e) { /* ignore */ }
}
function releaseWake() { try { if (wakeLock) wakeLock.release(); } catch (e) {} wakeLock = null; }
function enterFS() {
  const d = document.documentElement;
  const fn = d.requestFullscreen || d.webkitRequestFullscreen;
  if (fn) { try { fn.call(d); } catch (e) {} }
}
function exitFS() {
  const fn = document.exitFullscreen || document.webkitExitFullscreen;
  if (fn && (document.fullscreenElement || document.webkitFullscreenElement)) {
    try { fn.call(document); } catch (e) {}
  }
}

/* ---------- play view (full screen, tap to advance) ---------- */
function fitText(node, box, chip) {
  if (!node || !box) return;
  const avail = box.clientHeight - (chip ? chip.offsetHeight + 26 : 0) - 12;
  let size = 60; node.style.fontSize = size + "px";
  let guard = 0;
  while (guard++ < 40 && size > 16 &&
    (node.scrollHeight > avail || node.scrollWidth > box.clientWidth)) {
    size -= 2; node.style.fontSize = size + "px";
  }
}

function viewPlay() {
  const s = songById(view.id);
  if (!s) return go("list");
  const blocks = blocksOf(s.source);
  if (blocks.length === 0) { alert("La canción está vacía."); return go("read", s.id); }
  let idx = Math.min(Math.max(view.idx || 0, 0), blocks.length - 1);

  const overlay = el("div", "play");
  const bar = el("div", "play-bar");
  const exit = el("button", "icon", "✕"); exit.setAttribute("aria-label", "Salir");
  const prev = el("button", "icon", "‹"); prev.setAttribute("aria-label", "Anterior");
  const counter = el("div", "play-counter");
  bar.append(exit, prev, el("div", "grow"), counter);
  const stage = el("div", "play-stage");
  const hint = el("div", "play-hint", "tocá para avanzar");
  overlay.append(bar, stage, hint);
  app.append(overlay);

  let linesEl = null, chipEl = null;
  function paint() {
    const b = blocks[idx];
    stage.textContent = "";
    stage.style.setProperty("--pc", b.color || "var(--ink)");
    chipEl = null;
    if (b.label) { chipEl = el("div", "play-chip", b.label); stage.append(chipEl); }
    linesEl = el("div", "play-lines");
    for (const ln of b.lines) linesEl.append(el("div", "play-line", ln || " "));
    stage.append(linesEl);
    counter.textContent = (idx + 1) + " / " + blocks.length;
    prev.style.visibility = idx === 0 ? "hidden" : "visible";
    hint.style.display = idx === 0 ? "" : "none";
    fitText(linesEl, stage, chipEl);
    requestAnimationFrame(() => fitText(linesEl, stage, chipEl));
  }
  function onResize() { fitText(linesEl, stage, chipEl); }
  function close() {
    window.removeEventListener("resize", onResize);
    releaseWake(); exitFS(); go("read", s.id);
  }

  stage.addEventListener("click", () => {
    if (idx >= blocks.length - 1) { close(); return; }
    idx++; paint();
  });
  prev.addEventListener("click", () => { if (idx > 0) { idx--; paint(); } });
  exit.addEventListener("click", close);
  window.addEventListener("resize", onResize);

  enterFS(); acquireWake();
  paint();
}

/* ---------- render ---------- */
function render() {
  clear();
  if (view.name === "read") viewRead();
  else if (view.name === "edit") viewEdit();
  else if (view.name === "play") viewPlay();
  else viewList();
}

render();

// Primera visita: si no hay copia local, traigo la biblioteca publicada.
if (!hadLocal) {
  fetchPublished().then(pub => {
    if (pub && pub.length) {
      songs = pub; save();
      if (view.name === "list") render();
    }
  });
}
</script>
</body>
</html>
